apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "k8s-node-app.fullname" . }}-node-reader
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "k8s-node-app.fullname" . }}-node-reader-binding
subjects:
  - kind: ServiceAccount
    name: {{ include "k8s-node-app.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "k8s-node-app.fullname" . }}-node-reader
  apiGroup: rbac.authorization.k8s.io