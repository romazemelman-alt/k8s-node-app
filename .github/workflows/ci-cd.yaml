name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

# Provide permissions required for AWS OIDC authentication (id-token) and repository checkout
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: "eu-central-1"
  # IAM Role ARN configured via bootstrap OIDC script
  AWS_ROLE_ARN: "arn:aws:iam::881839569883:role/github-actions-ecr-push-dev"
  ECR_REPOSITORY: "dev-k8s-node-app"

jobs:
  # 1. Validation stage: Lint application code and Helm chart
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies Lint
        run: |
          pip install flake8
          # flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.12.0'

      - name: Helm Lint
        run: |
          helm lint charts/k8s-node-app

  # 2. Build stage: Build and push Docker image to AWS ECR
  build-and-push:
    name: Build & Push to ECR
    needs: lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' # Only trigger on actual branch pushes

    outputs:
      image_tag: ${{ steps.set-tag.outputs.tag }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Dynamically determine Docker image tag depending on the source branch
      - name: Set Image Tag
        id: set-tag
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            # Generate a production tag based on commit SHA
            TAG="prod-${{ github.sha }}"
          else
            # Default tag for dev or feature branches
            TAG="dev-${{ github.sha }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Calculated Tag: $TAG"

      # Securely authenticate with AWS using OIDC instead of static access keys
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Enable Buildx for layer caching support
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.set-tag.outputs.tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.ref_name }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 3. GitOps stage: Update the image tag inside Flux CD manifests
  gitops-update:
    name: Update Flux GitOps Config
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref_name == 'main' || github.ref_name == 'dev'

    steps:
      # Authenticate using a Personal Access Token (PAT) stored in GitHub Secrets
      # Make sure to create GITHUB_TOKEN_PATCH under Settings -> Secrets -> Actions
      - name: Checkout GitOps Infra Repository
        uses: actions/checkout@v4
        with:
          repository: 'romazemelman-alt/gitops-infra-platform'
          token: ${{ secrets.GITHUB_TOKEN_PATCH }}
          ref: 'main'

      - name: Update Image Tag in HelmRelease
        run: |
          TARGET_ENV="dev"
          if [ "${{ github.ref_name }}" = "main" ]; then
            # If pushed to main, deploy automatically to stage env
            TARGET_ENV="stage"
          fi
          
          FILE_PATH="flux/apps/environments/${TARGET_ENV}/helm-release.yaml"
          NEW_TAG="${{ needs.build-and-push.outputs.image_tag }}"
          
          # In-place YAML update using yq
          yq -i ".spec.values.image.tag = \"${NEW_TAG}\"" ${FILE_PATH}
          
          echo "Updated ${FILE_PATH} with tag ${NEW_TAG}"

      - name: Commit and Push Changes to Infra Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          git commit -m "chore(gitops): automated image update to ${{ needs.build-and-push.outputs.image_tag }} [skip ci]"
          git push origin main